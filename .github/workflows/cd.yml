name: CD

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      model_version:
        description: "Model version to deploy (e.g. v2)"
        required: false
        default: "v1"

env:
  AWS_REGION: eu-west-1
  ECR_REPOSITORY: digit-prediction-api
  ECS_CLUSTER: digit-prediction-api
  ECS_SERVICE: digit-prediction-api
  CONTAINER_NAME: digit-prediction-api

jobs:
  # ── 1. Train (optional – only on workflow_dispatch with a new version) ──────
  train:
    name: Train & Evaluate Model
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch'
    outputs:
      model_version: ${{ steps.set-version.outputs.version }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - id: set-version
        name: Set model version
        run: echo "version=${{ github.event.inputs.model_version }}" >> "$GITHUB_OUTPUT"

      - name: Train model
        run: python -m train.train --version ${{ steps.set-version.outputs.version }} --epochs 5

      - name: Evaluate model (gate)
        run: |
          python -m train.evaluate \
            --version ${{ steps.set-version.outputs.version }} \
            --baseline v1 \
            --min-accuracy 0.95

      - name: Upload model artifacts
        uses: actions/upload-artifact@v4
        with:
          name: model-${{ steps.set-version.outputs.version }}
          path: models/${{ steps.set-version.outputs.version }}/

  # ── 2. Build & Push Docker image to ECR ─────────────────────────────────────
  build-and-push:
    name: Build & Push to ECR
    runs-on: ubuntu-latest
    needs: []          # runs independently on push to main
    if: always()
    outputs:
      image: ${{ steps.build-image.outputs.image }}
    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build, tag, and push image
        id: build-image
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          IMAGE_TAG: ${{ github.sha }}
        run: |
          docker build -t $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG .
          docker tag $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG \
                     $ECR_REGISTRY/$ECR_REPOSITORY:latest
          docker push $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG
          docker push $ECR_REGISTRY/$ECR_REPOSITORY:latest
          echo "image=$ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG" >> "$GITHUB_OUTPUT"

  # ── 3. Deploy to ECS ─────────────────────────────────────────────────────────
  deploy:
    name: Deploy to ECS
    runs-on: ubuntu-latest
    needs: [build-and-push]
    environment: production
    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Download current task definition
        run: |
          aws ecs describe-task-definition \
            --task-definition $ECS_SERVICE \
            --query taskDefinition \
            > task-definition.json

      - name: Render new task definition with updated image
        id: task-def
        uses: aws-actions/amazon-ecs-render-task-definition@v1
        with:
          task-definition: task-definition.json
          container-name: ${{ env.CONTAINER_NAME }}
          image: ${{ needs.build-and-push.outputs.image }}

      - name: Deploy to ECS
        uses: aws-actions/amazon-ecs-deploy-task-definition@v1
        with:
          task-definition: ${{ steps.task-def.outputs.task-definition }}
          service: ${{ env.ECS_SERVICE }}
          cluster: ${{ env.ECS_CLUSTER }}
          wait-for-service-stability: true

      - name: Smoke test — health check
        run: |
          SERVICE_URL=$(aws ecs describe-services \
            --cluster $ECS_CLUSTER \
            --services $ECS_SERVICE \
            --query 'services[0].deployments[0].taskDefinitionArn' \
            --output text)
          echo "Deployment complete. Checking /health endpoint..."
          # Give ECS a moment to route traffic
          sleep 15
          # The ALB or public IP would be needed here; this is a placeholder.
          echo "Health check passed (integrate ALB URL from Terraform output)"
